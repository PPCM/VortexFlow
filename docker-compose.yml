version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: vortexflow-postgres
    environment:
      POSTGRES_DB: vortexflow
      POSTGRES_USER: vortexflow_user
      POSTGRES_PASSWORD: vortexflow_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - vortexflow-network

  # Redis Cache & Sessions
  redis:
    image: redis:6-alpine
    container_name: vortexflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vortexflow-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vortexflow-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://vortexflow_user:vortexflow_password@postgres:5432/vortexflow
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: your-super-secret-session-key-change-this-in-production
      ADMIN_EMAIL: admin@admin.com
      ADMIN_PASSWORD: VortexFlow2024!
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - vortexflow-network
    command: npm run dev

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vortexflow-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_WS_URL: ws://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - vortexflow-network
    command: npm start

  # Nginx Reverse Proxy (for production)
  nginx:
    image: nginx:alpine
    container_name: vortexflow-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - vortexflow-network
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:

networks:
  vortexflow-network:
    driver: bridge
